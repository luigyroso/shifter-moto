<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIFTER MOTO — Producto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0A0A0A;
  --card: #1E1E1E;
  --border: #2A2A2A;
  --white: #F0ECE4;
  --muted: #888888;
  --accent: #D4A72B;
  --accent-hover: #E0B840;
  --anodized: #3D3D3D;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--white);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(10, 10, 10, 0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 clamp(1.5rem, 5vw, 4rem);
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-logo img { height: 38px; width: auto; display: block; }
.nav-links { display: flex; align-items: center; gap: 2.5rem; list-style: none; }
.nav-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: color 0.3s;
}
.nav-links a:hover { color: var(--white); }
.back-link {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  transition: color 0.3s;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.back-link:hover { color: var(--white); }

/* PRODUCT LAYOUT */
.product-page {
  max-width: 1300px;
  margin: 0 auto;
  padding: 3rem clamp(1.5rem, 5vw, 4rem);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: start;
}

/* GALLERY */
.gallery {
  position: sticky;
  top: 100px;
}

.gallery-main {
  width: 100%;
  aspect-ratio: 1;
  background: var(--card);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 0.75rem;
}

.gallery-main img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 1.5rem;
  transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.gallery-main:hover img {
  transform: scale(1.05);
}

.gallery-thumbs {
  display: flex;
  gap: 0.5rem;
  overflow-x: auto;
}

.gallery-thumb {
  width: 72px;
  height: 72px;
  flex-shrink: 0;
  background: var(--card);
  border: 2px solid var(--border);
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.3s;
}

.gallery-thumb.active,
.gallery-thumb:hover {
  border-color: var(--accent);
}

.gallery-thumb img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 4px;
}

/* PRODUCT INFO */
.product-info-section {
  padding-top: 1rem;
}

.product-breadcrumb {
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.product-breadcrumb a {
  color: var(--muted);
  text-decoration: none;
  transition: color 0.3s;
}

.product-breadcrumb a:hover { color: var(--accent); }

.product-title {
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 400;
  letter-spacing: 0.03em;
  line-height: 1.05;
  margin-bottom: 0.5rem;
}

.product-brand {
  font-size: 0.75rem;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 1.5rem;
}

.product-price-block {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 0.5rem;
}

.product-price-current {
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: 2.5rem;
  color: var(--accent);
  letter-spacing: 0.02em;
}

.product-price-old {
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: 1.5rem;
  color: var(--muted);
  text-decoration: line-through;
}

.product-tax {
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 2rem;
}

.product-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.5rem 0;
}

/* VARIANTS */
.variant-group {
  margin-bottom: 1.5rem;
}

.variant-label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.75rem;
}

.variant-options {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.variant-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--white);
  padding: 0.6rem 1.2rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: border-color 0.3s, background 0.3s;
}

.variant-btn:hover { border-color: var(--muted); }
.variant-btn.active {
  border-color: var(--accent);
  background: rgba(212, 167, 43, 0.08);
}

/* CTA */
.product-cta {
  margin-top: 2rem;
  display: flex;
  gap: 1rem;
}

.btn-buy {
  flex: 1;
  background: var(--accent);
  color: #0A0A0A;
  padding: 1.1rem 2rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  transition: background 0.3s, transform 0.3s, box-shadow 0.3s;
  text-align: center;
  text-decoration: none;
  display: block;
}

.btn-buy:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(212, 167, 43, 0.3);
}

.btn-whatsapp {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--white);
  padding: 1.1rem 1.5rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: border-color 0.3s, background 0.3s;
  white-space: nowrap;
}

.btn-whatsapp:hover {
  border-color: var(--white);
  background: rgba(255,255,255,0.03);
}

/* FEATURES */
.product-features {
  margin-top: 2rem;
}

.product-features h3 {
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: 1.3rem;
  font-weight: 400;
  letter-spacing: 0.06em;
  margin-bottom: 1rem;
}

.feature-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.feature-list li {
  font-size: 0.85rem;
  color: rgba(240,236,228,0.75);
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  line-height: 1.5;
}

.feature-list li::before {
  content: '—';
  color: var(--accent);
  font-weight: 700;
  flex-shrink: 0;
}

/* SHIPPING STRIP */
.shipping-strip {
  margin-top: 2rem;
  display: flex;
  gap: 1.5rem;
}

.shipping-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: var(--muted);
}

.shipping-icon {
  font-size: 1rem;
}

/* COMPATIBILITY */
.compat-section {
  margin-top: 2rem;
  padding: 1.5rem;
  background: var(--card);
  border: 1px solid var(--border);
}

.compat-section h3 {
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: 1.1rem;
  font-weight: 400;
  letter-spacing: 0.06em;
  margin-bottom: 0.75rem;
}

.compat-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}

.compat-tag {
  background: rgba(240,236,228,0.05);
  border: 1px solid var(--border);
  padding: 0.3rem 0.7rem;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.03em;
}

/* FOOTER */
.footer {
  border-top: 1px solid var(--border);
  padding: 4rem clamp(1.5rem, 5vw, 4rem) 2rem;
  margin-top: 5rem;
}

.footer-inner {
  max-width: 1300px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 2rem;
}

.footer-logo img { height: 34px; width: auto; opacity: 0.6; }
.footer-social { display: flex; align-items: center; gap: 1.5rem; }
.footer-social a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.8rem;
  transition: color 0.3s;
}
.footer-social a:hover { color: var(--accent); }

.footer-copy {
  width: 100%;
  text-align: center;
  padding-top: 3rem;
  font-size: 0.7rem;
  color: #444;
  letter-spacing: 0.1em;
}

/* OUT OF STOCK */
.out-of-stock .btn-buy {
  background: var(--anodized);
  cursor: not-allowed;
  opacity: 0.5;
}
.out-of-stock .btn-buy:hover {
  transform: none;
  box-shadow: none;
}

.stock-badge {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.3rem 0.8rem;
  margin-bottom: 1rem;
}

.stock-badge.in-stock {
  background: rgba(212, 167, 43, 0.1);
  color: var(--accent);
  border: 1px solid rgba(212, 167, 43, 0.2);
}

.stock-badge.sold-out {
  background: rgba(255,255,255,0.05);
  color: var(--muted);
  border: 1px solid var(--border);
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .product-page {
    grid-template-columns: 1fr;
    gap: 2rem;
  }
  .gallery { position: static; }
  .nav-links { display: none; }
}
</style>
</head>

function formatPrice(n) {
  return '$' + n.toLocaleString('es-CO');
}

function render(slug) {
  const p = products[slug];
  if (!p) { window.location.href = 'index.html'; return; }

  document.title = `${p.title} — SHIFTER MOTO`;

  const stockClass = p.stock ? '' : ' out-of-stock';
  const stockBadge = p.stock
    ? '<span class="stock-badge in-stock">En stock</span>'
    : '<span class="stock-badge sold-out">Agotado</span>';

  let variantsHTML = '';
  if (p.variants) {
    const btns = p.variants.options.map((v, i) =>
      `<button class="variant-btn${i === 0 ? ' active' : ''}" data-price="${v.price}" onclick="selectVariant(this)">${v.name}</button>`
    ).join('');
    variantsHTML = `
      <div class="variant-group">
        <div class="variant-label">${p.variants.label}</div>
        <div class="variant-options">${btns}</div>
      </div>`;
  }

  let priceHTML = `<span class="product-price-current" id="current-price">${formatPrice(p.price)}</span>`;
  if (p.oldPrice) {
    priceHTML = `<span class="product-price-old">${formatPrice(p.oldPrice)}</span>` + priceHTML;
  }

  const thumbsHTML = p.images.map((img, i) =>
    `<div class="gallery-thumb${i === 0 ? ' active' : ''}" onclick="setImage(${i})"><img src="${img}" alt=""></div>`
  ).join('');

  const featuresHTML = p.features.map(f => `<li>${f}</li>`).join('');
  const motosHTML = p.motos.map(m => `<span class="compat-tag">${m}</span>`).join('');

  const buyLabel = p.stock ? 'Agregar al Carrito' : 'Agotado';

  document.getElementById('product-page').innerHTML = `
    <!-- GALLERY -->
    <div class="gallery">
      <div class="gallery-main">
        <img id="main-image" src="${p.images[0]}" alt="${p.title}">
      </div>
      <div class="gallery-thumbs">${thumbsHTML}</div>
    </div>

    <!-- INFO -->
    <div class="product-info-section${stockClass}">
      <div class="product-breadcrumb">
        <a href="index.html">Inicio</a> &nbsp;/&nbsp; <a href="index.html#productos">Productos</a> &nbsp;/&nbsp; ${p.category}
      </div>
      ${stockBadge}
      <h1 class="product-title">${p.title}</h1>
      <div class="product-brand">${p.brand}</div>
      <div class="product-price-block">${priceHTML} <span style="font-size:0.85rem;color:var(--muted)">COP</span></div>
      <div class="product-tax">Impuestos incluidos. Envío gratis en compras +$700.000</div>

      <hr class="product-divider">

      <p style="color:rgba(240,236,228,0.7);font-size:0.9rem;line-height:1.8;margin-bottom:1.5rem;">${p.desc}</p>

      ${variantsHTML}

      <div class="product-cta">
        <a href="${p.shopUrl}" target="_blank" class="btn-buy">${buyLabel}</a>
        <button class="btn-whatsapp" onclick="openWhatsApp('${p.title}')">WhatsApp</button>
      </div>

      <div class="shipping-strip">
        <div class="shipping-item"><span class="shipping-icon">&#x2708;</span> Envío nacional</div>
        <div class="shipping-item"><span class="shipping-icon">&#x2714;</span> Garantía 6 meses</div>
        <div class="shipping-item"><span class="shipping-icon">&#x2699;</span> Soporte técnico</div>
      </div>

      <hr class="product-divider">

      <div class="product-features">
        <h3>Características</h3>
        <ul class="feature-list">${featuresHTML}</ul>
      </div>

      <div class="compat-section">
        <h3>Motos Compatibles</h3>
        <div class="compat-tags">${motosHTML}</div>
      </div>
    </div>
  `;

  window._images = p.images;
}

function setImage(idx) {
  document.getElementById('main-image').src = window._images[idx];
  document.querySelectorAll('.gallery-thumb').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
}

function selectVariant(btn) {
  btn.closest('.variant-options').querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('current-price').textContent = formatPrice(parseInt(btn.dataset.price));
}

function openWhatsApp(productName) {
  const msg = encodeURIComponent(`Hola! Me interesa el producto: ${productName}. ¿Está disponible?`);
  window.open(`https://wa.me/573001234567?text=${msg}`, '_blank');
}

// Route
const params = new URLSearchParams(window.location.search);
const slug = params.get('p');
if (slug && products[slug]) {
  render(slug);
} else {
  window.location.href = 'index.html';
}
</script>
